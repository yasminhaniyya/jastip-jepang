<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jastip Jepang by hilyasmin 🇯🇵</title>
  

  <!-- favicon emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇯🇵</text></svg>" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ────────────────────────────────────────── -->
  <header class="header">
  <span class="header-flag">🇯🇵</span>
  <h1 id="store-name"></h1>
  <p class="subtitle" id="store-subtitle"></p>

  <div class="header-links">
    <a href="https://whatsapp.com/channel/0029VbDYDOE7NoZsCNsi1921"
       target="_blank">
      🌸 Info PO & Update Jastip (klik disini)
    </a>
  </div>
</header>

  <!-- ── KATEGORI ──────────────────────────────────────── -->
  <div class="cats-wrapper">
    <div class="cats" id="cats"></div>
  </div>
<div class="search-wrapper">
  <input
    type="text"
    id="search"
    placeholder=" Cari produk..."
  />
</div>
  <!-- ── GRID ──────────────────────────────────────────── -->
  <main>
    <div class="section-info">
      <span class="section-title" id="section-title">Semua Produk</span>
      <span class="section-count" id="section-count"></span>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- ── FOOTER ────────────────────────────────────────── -->
  <footer class="footer">
    © JASTIP JEPANG by hilyasmin · DM untuk info lebih lanjut
  </footer>

  <!-- ── DATA PRODUK ───────────────────────────────────── -->
  <script src="products.js"></script>

  <!-- ── APP LOGIC ─────────────────────────────────────── -->
  <script>
    // Isi nama toko dari products.js
    document.getElementById('store-name').textContent    = STORE_NAME;
    document.getElementById('store-subtitle').textContent = STORE_SUBTITLE;

    // Kategori otomatis dari data produk
    const allCats = ['Semua', ...new Set(products.map(p => p.category))];
    let activeCat = 'Semua';
    let searchTerm = '';

    // Format harga ke Rupiah
    function fmt(n) {
      return 'Rp' + n.toLocaleString('id-ID');
    }

    // Icon WA SVG
    const waIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>`;

    // Buat kartu produk
    function makeCard(p) {
      const waText = encodeURIComponent(
        `Halo kak, saya mau pesan *${p.name}*\nHarga: ${fmt(p.price)}\nDP: ${fmt(p.dp)}\n\n`
      );
      const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${waText}`;

      // Badge warna
      let badgeClass = '';
      if (p.badge) {
        const b = p.badge.toLowerCase();

        if (b === 'new') badgeClass = 'new';
        else if (b === 'most wanted') badgeClass = 'most-wanted';
        else if (b === 'best seller') badgeClass = 'best-seller';
        else if (b === 'best price') badgeClass = 'best-price';
        else if (b === 'SALE') badgeClass = 'SALE';
      }

      // Gambar: kalau file foto ada pakai <img>, kalau tidak pakai placeholder emoji
      const imgHtml = `
        <div class="card-img-wrap">
          <img
            class="card-img"
            src="${p.images?.[0] || p.image}"
            alt="${p.name}"
            loading="lazy"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
          />
          <div class="card-img-placeholder" style="display:none">🛍️</div>
          ${p.badge ? `<span class="badge ${badgeClass}">${p.badge}</span>` : ''}
        </div>`;

      const actionHtml = p.status === 'open'
        ? `<a class="btn-wa" href="${waUrl}" target="_blank" rel="noopener">${waIcon} Pesan via WA</a>`
        : `<span class="btn-closed">Stok habis / Closed</span>`;

      return `
        <div class="card">
          ${imgHtml}
          <div class="card-body">
            <p class="card-name">${p.name}</p>
            <span class="status-tag status-${p.status}">${p.status === 'open' ? 'Open PO' : 'Closed'}</span>
            <p class="card-price">${fmt(p.price)}</p>
            <p class="card-dp">DP ${fmt(p.dp)}</p>
            ${actionHtml}
          </div>
        </div>`;
    }

    // Render grid sesuai kategori aktif
    function render() {
      let list = activeCat === 'Semua'
  ? products
  : products.filter(p => p.category === activeCat);

list = list.filter(p =>
  p.name.toLowerCase().includes(searchTerm)
);

      document.getElementById('section-title').textContent =
        activeCat === 'Semua' ? 'Semua Produk' : activeCat;
      document.getElementById('section-count').textContent =
        list.length + ' produk';

      document.getElementById('grid').innerHTML = list.length
        ? list.map(makeCard).join('')
        : `<div class="empty">Belum ada produk di kategori ini 🙏</div>`;
    }

    // Buat tombol kategori
    const catsEl = document.getElementById('cats');
    allCats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        activeCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      catsEl.appendChild(btn);
    });
    document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  render();
});

    render();
  </script>

</body>
</html>
